name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 1. Backend Tests (Node 20)
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install & Test
        working-directory: ./server
        run: |
          npm ci
          npm test
        env:
          NODE_ENV: test

  # 2. Backend Coverage
  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Coverage Report
        working-directory: ./server
        run: |
          npm ci
          npm run test:coverage
        env:
          NODE_ENV: test

  # 3. Frontend Lint
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Lint Code
        working-directory: ./client
        run: |
          npm ci
          npm run lint

  # 4. Frontend Build
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Build Production
        working-directory: ./client
        run: |
          npm ci
          npm run build
        env:
          NODE_ENV: production

  # 5. Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
      - name: Audit Dependencies
        run: |
          cd server && npm audit --audit-level=high || true
          cd ../client && npm audit --audit-level=high || true

  # 6. View Tracking Tests
  view-tracking:
    name: View Tracking Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.10.0
        with:
          mongodb-version: '8.0'
      - name: Run ViewLog Tests
        working-directory: ./server
        run: |
          npm ci
          node src/tests/viewlog.test.js
        env:
          MONGODB_URI: mongodb://localhost:27017/yaml-visualizer-test
          NODE_ENV: test

  # 7. Code Quality
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Secrets
        run: |
          if grep -rE "(api[_-]?key|password|secret|token)['\"]?\s*[:=]" server/src client/src \
            --exclude-dir=node_modules \
            | grep -v ".env" \
            | grep -v "JWT_SECRET" \
            | grep -v "OPENAI_API_KEY"; then
            echo "⚠️ Potential secrets found!"
            exit 1
          fi
          echo "✅ No secrets detected"

  # 8. All Checks Summary
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-coverage, frontend-lint, frontend-build, security-audit, view-tracking, code-quality]
    steps:
      - name: Success
        run: |
          echo "✅ All 8 CI checks passed!"
          echo "🎉 Ready to merge"
