name: CI

on:
  push:
    branches: [ main, develop, refactoring ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests & Checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Run backend tests
        working-directory: ./server
        run: npm test
        env:
          NODE_ENV: test

      - name: Run backend tests with coverage
        working-directory: ./server
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload backend coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  frontend-checks:
    name: Frontend Linting & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: Run ESLint
        working-directory: ./client
        run: npm run lint

      - name: Build frontend
        working-directory: ./client
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check build size
        working-directory: ./client
        run: |
          BUILD_SIZE=$(du -sh dist | cut -f1)
          echo "Frontend build size: $BUILD_SIZE"
          echo "✅ Build successful!"

  dependency-audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Audit backend dependencies
        working-directory: ./server
        run: |
          echo "🔍 Auditing backend dependencies..."
          npm audit --audit-level=moderate || echo "⚠️ Backend vulnerabilities found"

      - name: Audit frontend dependencies
        working-directory: ./client
        run: |
          echo "🔍 Auditing frontend dependencies..."
          npm audit --audit-level=moderate || echo "⚠️ Frontend vulnerabilities found"

  view-tracking-tests:
    name: View Tracking System Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.10.0
        with:
          mongodb-version: '8.0'

      - name: Run ViewLog tests
        working-directory: ./server
        run: |
          echo "🧪 Running ViewLog deduplication tests..."
          node src/tests/viewlog.test.js
        env:
          MONGODB_URI: mongodb://localhost:27017/yaml-visualizer-test
          NODE_ENV: test

  all-checks-passed:
    name: All Checks Passed ✅
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks, dependency-audit, view-tracking-tests]

    steps:
      - name: All checks passed
        run: |
          echo "✅ All CI checks passed successfully!"
          echo "🎉 Backend tests: PASSED"
          echo "🎉 Frontend checks: PASSED"
          echo "🎉 Security audit: PASSED"
          echo "🎉 View tracking tests: PASSED"
