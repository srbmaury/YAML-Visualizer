name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-info:
    name: PR Information
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        run: |
          echo "Changed files in this PR:"
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tee changed_files.txt

          BACKEND_CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^server/' | wc -l)
          FRONTEND_CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^client/' | wc -l)

          echo "backend_changed=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "frontend_changed=$FRONTEND_CHANGED" >> $GITHUB_OUTPUT

          echo "📊 Files changed:"
          echo "   Backend files: $BACKEND_CHANGED"
          echo "   Frontend files: $FRONTEND_CHANGED"

      - name: PR size check
        run: |
          ADDITIONS=$(git diff --numstat ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | awk '{sum+=$1} END {print sum}')
          DELETIONS=$(git diff --numstat ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | awk '{sum+=$2} END {print sum}')
          TOTAL=$((ADDITIONS + DELETIONS))

          echo "📏 PR Size:"
          echo "   Additions: +$ADDITIONS"
          echo "   Deletions: -$DELETIONS"
          echo "   Total: $TOTAL lines"

          if [ $TOTAL -gt 1000 ]; then
            echo "⚠️ Large PR detected! Consider splitting into smaller PRs."
          else
            echo "✅ PR size is reasonable"
          fi

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Check for console.log in frontend
        run: |
          echo "🔍 Checking for console.log statements in frontend..."
          if grep -r "console\.log" client/src --exclude-dir=node_modules; then
            echo "⚠️ Found console.log statements. Consider removing or using proper logging."
          else
            echo "✅ No console.log statements found"
          fi

      - name: Check for TODO comments
        run: |
          echo "📝 Checking for TODO comments..."
          if grep -r "TODO\|FIXME\|XXX\|HACK" server/src client/src --exclude-dir=node_modules; then
            echo "⚠️ Found TODO/FIXME comments in code"
          else
            echo "✅ No TODO/FIXME comments found"
          fi

      - name: Check for secrets in code
        run: |
          echo "🔐 Checking for potential secrets..."
          if grep -rE "(api[_-]?key|password|secret|token)['\"]?\s*[:=]" server/src client/src --exclude-dir=node_modules | grep -v ".env"; then
            echo "⚠️ Potential secrets found in code! Review carefully."
            exit 1
          else
            echo "✅ No obvious secrets found in code"
          fi

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [pr-info]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Run backend tests and generate summary
        working-directory: ./server
        run: |
          echo "🧪 Running backend tests..."
          npm test -- --verbose 2>&1 | tee test-output.txt

          if [ -f test-output.txt ]; then
            TESTS_PASSED=$(grep -c "PASS" test-output.txt || echo "0")
            TESTS_FAILED=$(grep -c "FAIL" test-output.txt || echo "0")
            echo "✅ Tests passed: $TESTS_PASSED"
            echo "❌ Tests failed: $TESTS_FAILED"
          fi
        env:
          NODE_ENV: test

  pr-comment:
    name: Post PR Comment
    runs-on: ubuntu-latest
    needs: [pr-info, code-quality, test-summary]
    if: always()

    steps:
      - name: Create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const commentBody = `
            ## 🤖 PR Check Summary

            ✅ All required checks have completed!

            ### Checks performed:
            - ✓ Backend tests
            - ✓ Frontend linting and build
            - ✓ Code quality checks
            - ✓ Security scan

            ---
            *Automated by GitHub Actions*
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
